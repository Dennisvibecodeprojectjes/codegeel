<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚠️ APOCALYPSE NU: HET IS ALTIJD WEL ERGENS CODE GEEL ⚠️</title>
    <style>
        body {
            background-color: #060709;
            color: #e2e8f0;
            font-family: 'Impact', 'Arial Black', sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
        }

        .sirene-banner {
            background: linear-gradient(90deg, #ffcc00 25%, #000 25%, #000 50%, #ffcc00 50%, #ffcc00 75%, #000 75%, #000 100%);
            background-size: 40px 40px;
            height: 25px;
            margin-bottom: 20px;
            box-shadow: 0 0 15px #ffcc00;
        }

        h1 {
            font-size: 3.5rem;
            color: #ffcc00;
            text-shadow: 3px 3px #000, 0 0 25px rgba(255, 204, 0, 0.5);
            margin: 10px 0 5px 0;
            letter-spacing: 1px;
        }

        .subtitle {
            font-family: sans-serif;
            font-weight: bold;
            color: #a0aec0;
            text-transform: uppercase;
            margin-bottom: 25px;
        }

        .stats-bar {
            background: #1a202c;
            border: 2px solid #ffcc00;
            padding: 15px;
            font-size: 1.5rem;
            max-width: 600px;
            margin: 0 auto 30px auto;
            border-radius: 8px;
        }

        .counter {
            color: #ff3333;
            font-size: 2.2rem;
            display: block;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            max-width: 1300px;
            margin: 0 auto;
            padding: 20px;
        }

        .alarm-card {
            background: #111622;
            border: 3px solid #ffcc00;
            border-radius: 12px;
            padding: 25px;
            text-align: left;
            position: relative;
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.2);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-orange { border-color: #ff6600; box-shadow: 0 0 20px rgba(255, 102, 0, 0.4); }
        .card-red { border-color: #ff0000; box-shadow: 0 0 35px rgba(255, 0, 0, 0.6); }

        .status-badge {
            align-self: flex-start;
            padding: 6px 16px;
            font-size: 1rem;
            border-radius: 20px;
            color: black;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }
        .bg-yellow { background-color: #ffcc00; }
        .bg-orange { background-color: #ff6600; color: white; }
        .bg-red { background-color: #ff0000; color: white; animation: pulse-red 1s infinite; }

        @keyframes pulse-red {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        h2 {
            margin: 0 0 10px 0;
            font-size: 2rem;
            border-bottom: 1px solid #2d3748;
            padding-bottom: 5px;
        }

        .phenomenon {
            color: #cbd5e0;
            font-family: monospace;
            font-size: 1.1rem;
            margin-bottom: 15px;
        }

        .official-text {
            font-family: sans-serif;
            font-size: 0.9rem;
            color: #718096;
            font-style: italic;
            margin-bottom: 15px;
            max-height: 75px;
            overflow-y: auto;
        }

        .campy-comment {
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid #ff3333;
            padding: 10px;
            font-family: sans-serif;
            font-size: 1.05rem;
            color: #f7fafc;
            font-weight: bold;
        }
        
        .loading {
            font-size: 2rem;
            color: #ffcc00;
            grid-column: 1 / -1;
            padding: 50px;
        }
    </style>
</head>
<body>

    <div class="sirene-banner"></div>

    <h1>CODE GEEL CENTRALE</h1>
    <div class="subtitle">Bewijs dat de wereld áltijd ergens een klein beetje vergaat</div>

    <div class="stats-bar">
        CRISIS STATUS:
        <span class="counter" id="danger-counter">LIVE EUROPA RADAR LAADT IN...</span>
    </div>

    <div class="dashboard-grid" id="alarm-container">
        <div class="loading">🚨 METING START OP... LIVE SATELLIETVERBINDING MET NOORWEGEN WORDT OPGEBOUWD...</div>
    </div>

    <script>
        // De Campy Commentaren Matrix per land en weertype
        const countryStereotypes = {
            "NL": "Typisch. Drie druppels regen en we eisen direct een rampenoverleg.",
            "BE": "Code Geel in België? Sterkte met de gaten in de weg die nu vollopen met water.",
            "DE": "Achtung! De Bratwurst-paraplu's moeten nu verankerd worden.",
            "FR": "Grote paniek, de Fransen moeten mogelijk binnenshuis wijn gaan drinken.",
            "ES": "Zelfs als het hier 45 graden is roepen ze pas Code Geel. Vandaag smelt de siësta.",
            "IT": "Drama! De espresso's koelen 2 graden sneller af door de windstoten.",
            "GB": "Het regent een keer níét normaal, dus het hele land ligt direct plat.",
            "AT": "Oostenrijk trekt zich hier niks van aan, die skiën gewoon door met een Schnapps.",
            "CH": "Zelfs het alarm is hier uiterst punctueel en waarschijnlijk heel duur.",
            "NO": "Voor Noren is dit gewoon 'korte broeken weer', maar het systeem telt het als crisis."
        };

        const weatherComments = {
            "wind": "Houd je toupet vast, moeders wasgoed vliegt naar de buren.",
            "snow-ice": "Code Geel voor een snufje poedersuiker op het asfalt. Hamsteren!!",
            "thunderstorm": "God is met de potten en pannen aan het slaan. Tijd om dramatisch uit het raam te staren.",
            "rain": "Het miezert. Apocalyptische taferelen voor suikerpopjes.",
            "heat": "De mussen vallen niet van het dak, ze verdampen ter plekke.",
            "default": "Wees extreem alert op milde ongemakken!"
        };

        function getAlarmType(awarenessType) {
            if (!awarenessType) return 'default';
            const type = awarenessType.toLowerCase();
            if (type.includes('wind')) return 'wind';
            if (type.includes('snow') || type.includes('ice') || type.includes('low-temperature')) return 'snow-ice';
            if (type.includes('thunderstorm') || type.includes('lightning')) return 'thunderstorm';
            if (type.includes('rain') || type.includes('flood')) return 'rain';
            if (type.includes('heat') || type.includes('high-temperature')) return 'heat';
            return 'default';
        }

        function genereerCampyComment(countryCode, type) {
            const countryText = countryStereotypes[countryCode] || "De lokale bevolking is volledig in alle staten over dit volstrekt normale weersverschijnsel.";
            const weatherText = weatherComments[type] || weatherComments['default'];
            return `${countryText} — ${weatherText}`;
        }

async function fetchLiveAlarms() {
    try {
        // We pakken de directe, openbare Europese Meteoalarm-feed van de open data community op GitHub
        // Deze omzeilt alle weerserver-blokkades en ververst continu!
        const response = await fetch('https://raw.githubusercontent.com/all-alerts/meteoalarm-weather-alerts/main/alerts.json');
        
        if (!response.ok) throw new Error('Kon de open-data feed niet bereiken');
        
        const data = await response.json();
        
        // De structuur kan een array zijn of een GeoJSON (afhankelijk van de verwerking)
        // We zorgen dat we de alerts netjes pakken
        const features = data.features || data;
        
        const activeAlerts = features.filter(f => {
            const props = f.properties || f;
            const color = props.riskMatrixColor || props.severity || props.awareness_level || '';
            return color.toLowerCase().includes('yellow') || 
                   color.toLowerCase().includes('orange') || 
                   color.toLowerCase().includes('red') ||
                   color.toLowerCase().includes('moderate') || // Soms gebruikt men Engelse termen
                   color.toLowerCase().includes('severe');
        });

        document.getElementById('danger-counter').innerHTML = `
            ER ZIJN NU <strong style="font-size:3rem;">${activeAlerts.length}</strong> ACTIEVE ALARMEN! <br>
            <span style="font-size: 1.1rem; font-family:sans-serif; color:#cbd5e0;">Conclusie: Het is inderdaad áltijd ergens code geel.</span>
        `;

        renderAlarms(activeAlerts);
    } catch (error) {
        console.error(error);
        document.getElementById('danger-counter').innerText = "📡 VERBINDING MET METEO-SATELLIET MISLUKT";
        document.getElementById('alarm-container').innerHTML = `
            <div class="loading">
                Zelfs GitHub krijgt geen poort open bij de weergoden.<br>
                <span style="font-size: 1.2rem; font-family: sans-serif; color: #a0aec0;">
                    Foutmelding: ${error.message}. We proberen het zo opnieuw!
                </span>
            </div>`;
    }
}

       function renderAlarms(alerts) {
    const container = document.getElementById('alarm-container');
    container.innerHTML = '';

    if (alerts.length === 0) {
        container.innerHTML = `<div class="loading">Ongelofelijk... Het is nergens code geel. De wereld is saai vandaag.</div>`;
        return;
    }

    // Sorteer op heftigheid
    alerts.sort((a, b) => {
        const pA = a.properties || a;
        const pB = b.properties || b;
        const colorA = (pA.riskMatrixColor || pA.severity || '').toLowerCase();
        const colorB = (pB.riskMatrixColor || pB.severity || '').toLowerCase();
        if (colorA.includes('red') || colorA.includes('extreme')) return -1;
        if (colorB.includes('red') || colorB.includes('extreme')) return 1;
        if (colorA.includes('orange') || colorA.includes('severe')) return -1;
        return 0;
    });

    // Toon de top 30
    alerts.slice(0, 30).forEach(alert => {
        const props = alert.properties || alert;
        
        let severity = 'GEEL';
        let cardClass = '';
        let badgeClass = 'bg-yellow';
        const colorRaw = (props.riskMatrixColor || props.severity || props.awareness_level || '').toLowerCase();
        
        if (colorRaw.includes('orange') || colorRaw.includes('severe')) {
            severity = 'ORANJE';
            cardClass = 'card-orange';
            badgeClass = 'bg-orange';
        } else if (colorRaw.includes('red') || colorRaw.includes('extreme')) {
            severity = 'ROOD';
            cardClass = 'card-red';
            badgeClass = 'bg-red';
        }

        const areaName = props.areaDesc || props.area || props.headline || "Onbekend Gebied";
        const landCode = props.countryCode || (props.area ? props.area.substring(0, 2).toUpperCase() : "EU");
        const fenomeen = props.event || props.awareness_type || "Natuurkrachten";
        const weatherType = getAlarmType(fenomeen);
        
        const campyComment = genereerCampyComment(landCode, weatherType);
        const officieleTekst = props.description || props.instruction || props.title || "Geen specifieke uitleg. Pure intuïtieve paniek dus.";

        container.innerHTML += `
            <div class="alarm-card ${cardClass}">
                <div>
                    <span class="status-badge ${badgeClass}">CODE ${severity}</span>
                    <h2>🌍 ${areaName}</h2>
                    <div class="phenomenon">⚠️ DREIGING: ${fenomeen.toUpperCase()}</div>
                    <div class="official-text" title="${officieleTekst}">${officieleTekst}</div>
                </div>
                <div class="campy-comment">
                    🗣️ RELEVANTE ANALYSE:<br>"${campyComment}"
                </div>
            </div>
        `;
    });
}
        // Vuur de live meting af
        fetchLiveAlarms();
        
        // Elke 10 minuten verversen
        setInterval(fetchLiveAlarms, 600000);
    </script>
</body>
</html>
